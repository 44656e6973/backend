version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${DB_NAME:-ideaboard_db}
      POSTGRES_USER: ${DB_USER:-ideaboard_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ideaboard_user} -d ${DB_NAME:-ideaboard_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: 
      context: ..  
      dockerfile: docker/app.Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ..:/app  
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=${DB_NAME:-ideaboard_db}
      - DB_USER=${DB_USER:-ideaboard_user}
      - DB_PASSWORD=${DB_PASSWORD:-secure_password}
      - DB_HOST=db 
      - DB_PORT=5432
      - DJANGO_DEBUG=True
    depends_on:
      db:
        condition: service_healthy 

volumes:
  postgres_data: