version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${DB_NAME:-ideaboard_db}
      POSTGRES_USER: ${DB_USER:-ideaboard_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ideaboard_user} -d ${DB_NAME:-ideaboard_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: 
      context: ..  
      dockerfile: docker/app.Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ..:/app  
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=${DB_NAME:-ideaboard_db}
      - DB_USER=${DB_USER:-ideaboard_user}
      - DB_PASSWORD=${DB_PASSWORD:-secure_password}
      - DB_HOST=db 
      - DB_PORT=5432
      - DJANGO_DEBUG=True
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy 
      redis:
        condition: service_healthy 

  celery_worker:
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
    command: celery -A core worker --loglevel=info
    volumes:
      - ..:/app
    environment:
      - DB_NAME=${DB_NAME:-ideaboard_db}
      - DB_USER=${DB_USER:-ideaboard_user}
      - DB_PASSWORD=${DB_PASSWORD:-secure_password}
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_DEBUG=True
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
    command: celery -A core beat --loglevel=info
    volumes:
      - ..:/app
    environment:
      - DB_NAME=${DB_NAME:-ideaboard_db}
      - DB_USER=${DB_USER:-ideaboard_user}
      - DB_PASSWORD=${DB_PASSWORD:-secure_password}
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_DEBUG=True
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy 

volumes:
  postgres_data:
